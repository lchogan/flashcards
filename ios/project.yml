name: Flashcards
options:
  bundleIdPrefix: com.lukehogan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug

settings:
  base:
    DEVELOPMENT_TEAM: UWK6JHFFGJ
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Flashcards:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Flashcards
        createIntermediateGroups: true
    resources: []
    info:
      path: Flashcards/Info.plist
      properties:
        CFBundleDisplayName: Flashcards
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukehogan.flashcards
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"

  FlashcardsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources: [FlashcardsTests]
    dependencies:
      - target: Flashcards
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukehogan.flashcards.tests

  FlashcardsUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources: [FlashcardsUITests]
    dependencies:
      - target: Flashcards
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukehogan.flashcards.uitests

schemes:
  Flashcards:
    build:
      targets:
        Flashcards: all
        FlashcardsTests: [test]
        FlashcardsUITests: [test]
    test:
      targets:
        - FlashcardsTests
        - FlashcardsUITests
      gatherCoverageData: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
