name: Flashcards
options:
  bundleIdPrefix: com.lukehogan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug

settings:
  base:
    DEVELOPMENT_TEAM: UWK6JHFFGJ
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: 4.2.2
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.0.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.0.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.40.0

targets:
  Flashcards:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Flashcards
        createIntermediateGroups: true
    resources:
      - Flashcards/Assets.xcassets
    info:
      path: Flashcards/Info.plist
      properties:
        CFBundleDisplayName: Flashcards
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukehogan.flashcards
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    dependencies:
      - package: KeychainAccess
        product: KeychainAccess
      - package: MarkdownUI
        product: MarkdownUI
      - package: PostHog
        product: PostHog
      - package: Sentry
        product: Sentry
    preBuildScripts:
      - name: SwiftLint
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --config "${SRCROOT}/.swiftlint.yml" --strict
          else
            echo "warning: SwiftLint not installed — brew install swiftlint"
          fi
        basedOnDependencyAnalysis: false

  FlashcardsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources: [FlashcardsTests]
    dependencies:
      - target: Flashcards
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukehogan.flashcards.tests
        GENERATE_INFOPLIST_FILE: YES

  FlashcardsUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources: [FlashcardsUITests]
    dependencies:
      - target: Flashcards
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukehogan.flashcards.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Flashcards:
    build:
      targets:
        Flashcards: all
        FlashcardsTests: [test]
        FlashcardsUITests: [test]
    test:
      targets:
        - FlashcardsTests
        - FlashcardsUITests
      gatherCoverageData: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
